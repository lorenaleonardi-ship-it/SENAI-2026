<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Landing Simples</title>
</head>

<body>

    
    <div id="carouselSimples" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://i.pinimg.com/736x/01/cb/99/01cb99a73861799352ef7f8c13604210.jpg" class="d-block w-100" alt="Imagem 1">
            </div>

            <div class="carousel-item">
                <img src="https://i.pinimg.com/736x/4f/cd/1a/4fcd1a719a5127d549f6992dc3bb00c2.jpg" class="d-block w-100" alt="Imagem 2">
            </div>

            <div class="carousel-item">
                <img src="https://i.pinimg.com/736x/d6/98/96/d6989608c39c3688b97f7e597aabb225.jpg" class="d-block w-100" alt="Imagem 3">
            </div>

        </div>

        
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselSimples" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselSimples" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>

    
    <footer class="bg-dark text-white text-center p-3">
        <p class="mb-0">© 2026 - Minha Landing Page</p>
    </footer>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
